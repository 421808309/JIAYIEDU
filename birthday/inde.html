<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>生日快乐 - 文彬</title>
    <style>
        /* ========== 基础重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #fdf6f8;
            font-family: "Microsoft YaHei", "Segoe UI", "PingFang SC", Roboto, "Helvetica Neue", sans-serif;
            overflow-x: hidden;
        }

        /* ========== 密码页 (完全保留原风格，仅微调体验) ========== */
        .page1 {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal {
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
            width: 280px;
        }

        .modal h2 {
            color: #e63946;
            margin-bottom: 20px;
            font-size: 26px;
        }

        #pwd {
            padding: 10px;
            width: 180px;
            border-radius: 8px;
            border: 1px solid #ffb7c5;
            text-align: center;
            font-size: 16px;
            outline: none;
        }
        #pwd:focus {
            border-color: #e63946;
        }

        .tip {
            font-size: 12px;
            color: #c96b7a;
            margin: 6px 0 16px;
            background: #fff0f2;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .btn {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        #confirm {
            background: #e63946;
            color: #fff;
        }
        #confirm:active { transform: scale(0.96);}
        #cancel {
            background: #e9e9ef;
            color: #5e5e6e;
        }

        /* ========== 蛋糕祝福页 (完全保留原始蛋糕样式 + 星星装饰) ========== */
        .page2 {
            width: 100%;
            height: 100vh;
            background: linear-gradient(#ffd6e0, #fef2f7);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        /* 原始蛋糕容器 + 相对定位 (修复蜡烛位置，让火焰真正定位在蛋糕上，但蛋糕形状完全不变) */
        .cake {
            width: 180px;
            height: 160px;
            animation: up 1s forwards 0.5s;
            opacity: 0;
            position: relative;   /* 关键：让火焰相对蛋糕定位，修复位置偏差，保留蛋糕所有伪元素外观 */
        }

        /* 下层蛋糕胚 (完全原始) */
        .cake::before {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 70px;
            background: #f8b5c7;
            border-radius: 8px 8px 0 0;
        }

        /* 上层蛋糕胚 (完全原始) */
        .cake::after {
            content: "";
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 60px;
            background: #ffc2d1;
            border-radius: 8px 8px 0 0;
        }

        /* 火焰 (原始样式+定位修复，保证蜡烛在蛋糕顶部中央) */
        .huoyan {
            position: absolute;
            top: -8px;           /* 微调让火焰正好在上层蛋糕顶部冒出，看起来像蜡烛火焰 */
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 22px;
            background: #ff9f1c;
            border-radius: 50% 50% 40% 40%;
            animation: shuo 0.6s infinite alternate;
            box-shadow: 0 0 6px #ffaa33;
            z-index: 5;
        }

        /* 火焰闪烁动画 (原始) */
        @keyframes shuo {
            from { opacity: 0.8; transform: translateX(-50%) scale(1);}
            to { opacity: 1; transform: translateX(-50%) scale(1.1);}
        }

        /* 蛋糕上升动画 */
        @keyframes up {
            to { opacity: 1; transform: translateY(0);}
        }

        /* 标题与名字动画 */
        .hb {
            font-size: 32px;
            font-weight: bold;
            color: #e63946;
            margin-top: 20px;
            opacity: 0;
            animation: xian 1.2s forwards 1.2s;
            text-shadow: 0 2px 6px #ffb7c5;
        }

        .name {
            font-size: 22px;
            color: #c1121f;
            margin-top: 10px;
            opacity: 0;
            animation: xian 1.2s forwards 1.8s;
            background: rgba(255,240,242,0.7);
            padding: 5px 18px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }

        @keyframes xian {
            to { opacity: 1; }
        }

        /* 原始星星装饰 */
        .star {
            position: absolute;
            color: #fff;
            font-size: 22px;
            animation: shan 2s infinite alternate;
            opacity: 0;
            pointer-events: none;
        }
        .s1 { top: 10%; left: 20%; animation-delay: 0s; }
        .s2 { top: 15%; right: 25%; animation-delay: 0.4s; }
        .s3 { bottom: 20%; left: 15%; animation-delay: 0.8s; }
        .s4 { bottom: 15%; right: 20%; animation-delay: 0.2s; }
        /* 额外增加几颗小星，使气氛更浓，不干扰蛋糕结构 */
        .s5 { top: 30%; left: 85%; animation-delay: 0.6s; font-size: 18px;}
        .s6 { top: 70%; left: 8%; animation-delay: 1s; font-size: 20px;}

        @keyframes shan {
            to { opacity: 1; }
        }

        /* 轻触提示 (保留原始风格) */
        .click-tip {
            position: absolute;
            bottom: 28px;
            font-size: 13px;
            color: #b95c6b;
            background: rgba(255, 245, 240, 0.8);
            padding: 5px 18px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            animation: gentlePulse 1.8s infinite;
            pointer-events: none;
            font-weight: 500;
        }
        @keyframes gentlePulse {
            0% { opacity: 0.6; transform: scale(0.96);}
            100% { opacity: 1; transform: scale(1.02);}
        }

        /* ========== 贺卡页 (典雅祝福) ========== */
        .page3 {
            width: 100%;
            min-height: 100vh;
            background: #fff7f9;
            display: none;
            padding: 30px;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            border: 2px solid #ffc2d1;
            line-height: 1.9;
            font-size: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        .card p {
            opacity: 0;
            margin: 12px 0;
        }

        .right {
            text-align: right;
            margin-top: 20px;
            font-style: italic;
            color: #e05a6f;
        }

        /* ========== 音乐控制悬浮按钮 (新增，完全不干扰蛋糕样式) ========== */
        .music-float {
            position: fixed;
            bottom: 22px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255, 245, 245, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
            border: 1px solid #ffb7c5;
            transition: 0.2s;
            color: #e63946;
        }
        .music-float:active {
            transform: scale(0.92);
        }
        /* 密码页时按钮半透明但不影响使用 */
        .page1 .music-float {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<!-- 背景音乐 (本地文件 birthday.mp3) -->
<audio id="bgm" loop preload="auto">
    <source src="birthday.mp3" type="audio/mpeg">
    您的浏览器不支持音频，但祝福不减。
</audio>

<!-- 密码验证层 -->
<div class="page1" id="p1">
    <div class="modal">
        <h2>生日快乐</h2>
        <input type="text" id="pwd" placeholder="请输入生日密码" maxlength="4" inputmode="numeric">
        <div class="tip">🔐 提示：生日日期 0408</div>
        <div class="btn">
            <button id="confirm">确定</button>
            <button id="cancel">取消</button>
        </div>
    </div>
</div>

<!-- 蛋糕祝福页 (蛋糕样式原汁原味，仅修复蜡烛定位) -->
<div class="page2" id="p2">
    <div class="star s1">✨</div>
    <div class="star s2">✨</div>
    <div class="star s3">🎀</div>
    <div class="star s4">✨</div>
    <div class="star s5">🌟</div>
    <div class="star s6">🎈</div>
    
    <div class="cake">
        <div class="huoyan"></div>
    </div>
    <div class="hb">HAPPY BIRTHDAY</div>
    <div class="name">文彬</div>
    <div class="click-tip">✨ 点击蛋糕 · 查收贺卡 ✨</div>
</div>

<!-- 祝福贺卡页 -->
<div class="page3" id="p3">
    <div class="card">
            <p>TO 文彬</p>
            <p>✨✨🎂生日快乐🥳✨✨</p>
            <p>感谢你为嘉一教育付出的每一天，今天请把时间留给自己。</p>
            <p>带薪休假一天，请放心去放松，安心享受你的专属假期。</p>
            <p>愿你新的一岁，工作顺心，生活温暖，快乐常伴。</p
        <p class="right">—— 嘉一教育</p>
    </div>
</div>

<!-- 音乐控制悬浮球 -->
<div class="music-float" id="musicToggleBtn">🔊</div>

<script>
    (function() {
        // ----- DOM 元素 -----
        const page1 = document.getElementById('p1');
        const page2 = document.getElementById('p2');
        const page3 = document.getElementById('p3');
        const pwdInput = document.getElementById('pwd');
        const confirmBtn = document.getElementById('confirm');
        const cancelBtn = document.getElementById('cancel');
        const bgmAudio = document.getElementById('bgm');
        const musicToggle = document.getElementById('musicToggleBtn');

        // 音乐状态
        let isMusicPlaying = false;
        let musicFailed = false;

        // 配置音乐 (音量&循环)
        if (bgmAudio) {
            bgmAudio.volume = 0.4;
            bgmAudio.loop = true;
        }

        // 尝试播放音乐 (需要用户手势)
        function attemptPlayMusic() {
            if (!bgmAudio) return;
            if (isMusicPlaying) return;
            bgmAudio.play().then(() => {
                isMusicPlaying = true;
                musicToggle.innerHTML = "🔊";
                musicFailed = false;
            }).catch(err => {
                console.warn("音乐播放受限，需要用户交互", err);
                isMusicPlaying = false;
                musicToggle.innerHTML = "🔇";
                musicFailed = true;
            });
        }

        // 暂停音乐
        function pauseMusic() {
            if (!bgmAudio) return;
            bgmAudio.pause();
            isMusicPlaying = false;
            musicToggle.innerHTML = "🔇";
        }

        // 切换音乐（悬浮按钮）
        function toggleMusic() {
            if (!bgmAudio) return;
            if (isMusicPlaying) {
                pauseMusic();
            } else {
                // 尝试播放（点击按钮是有效手势）
                bgmAudio.play().then(() => {
                    isMusicPlaying = true;
                    musicToggle.innerHTML = "🔊";
                }).catch(() => {
                    isMusicPlaying = false;
                    musicToggle.innerHTML = "🔇";
                    // 轻度提示但不打扰过多
                    if (!window._toastShowed) {
                        window._toastShowed = true;
                        setTimeout(() => {
                            alert("🎵 请允许浏览器自动播放，再点一次音乐按钮即可播放～");
                        }, 100);
                    }
                });
            }
        }

        // 绑定音乐按钮事件
        if (musicToggle) {
            musicToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleMusic();
            });
        }

        // ----- 密码验证逻辑 (保持原交互)-----
        function verifyPassword() {
            const val = pwdInput.value.trim();
            if (val === '0408') {
                // 密码正确，切换到蛋糕页
                page1.style.display = 'none';
                page2.style.display = 'flex';
                // 尝试播放音乐 (因为点击确定按钮是用户手势)
                if (bgmAudio && !isMusicPlaying) {
                    bgmAudio.play().then(() => {
                        isMusicPlaying = true;
                        musicToggle.innerHTML = "🔊";
                    }).catch(() => {
                        isMusicPlaying = false;
                        musicToggle.innerHTML = "🔇";
                    });
                }
            } else {
                alert('密码不正确哦 💡 提示：0408');
                pwdInput.value = '';
                pwdInput.focus();
            }
        }

        confirmBtn.onclick = (e) => {
            e.stopPropagation();
            verifyPassword();
        };

        cancelBtn.onclick = (e) => {
            e.stopPropagation();
            pwdInput.value = '';
            pwdInput.focus();
        };

        // 支持回车键提交
        pwdInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                verifyPassword();
            }
        });

        // ----- 蛋糕页 -> 贺卡页 (保留原始动画 & 音乐辅助) -----
        page2.addEventListener('click', () => {
            page2.style.display = 'none';
            page3.style.display = 'flex';
            
            // 逐行显示贺卡文字 (保留原始优雅效果)
            const paragraphs = document.querySelectorAll('.card p');
            paragraphs.forEach((p, idx) => {
                p.style.animation = 'none';
                p.style.opacity = '0';
                // 强制重绘
                void p.offsetHeight;
                setTimeout(() => {
                    p.style.animation = 'xian 0.6s forwards';
                }, idx * 200);
            });
            
            // 如果音乐尚未播放，再次尝试播放（点击蛋糕页也是有效手势）
            if (bgmAudio && !isMusicPlaying && bgmAudio.paused) {
                bgmAudio.play().then(() => {
                    isMusicPlaying = true;
                    musicToggle.innerHTML = "🔊";
                }).catch(() => {});
            }
        });

        // 附加：当从蛋糕页跳转之后，如果用户需要重新回到蛋糕？不需要，但保持优雅
        // 确保移动端视口适配
        function setVhFix() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        setVhFix();
        window.addEventListener('resize', setVhFix);
        
        // 若音乐因网络或文件缺失，不影响祝福流程 (只控制台提醒)
        if (bgmAudio) {
            bgmAudio.addEventListener('error', () => {
                console.warn("⚠️ 未检测到 birthday.mp3 文件，请确保音乐与网页在同一目录下，命名完全一致。");
                musicToggle.innerHTML = "🎵";
            });
        }
        
        // 保留原汁原味：蛋糕样式完全保留，仅修复 .huoyan 定位至蛋糕顶部（原代码缺少相对定位导致蜡烛乱跑）
        // 现在 .cake 已添加 position: relative，火焰完美置于蛋糕上层中央，且保留了所有伪类蛋糕形状。
        // 符合用户要求“蛋糕原来的样子，位置正确”
        console.log("🎂 祝福已加载，蛋糕样式原样保留，音乐控制已添加。请将 birthday.mp3 放在同目录下。");
    })();
</script>
</body>
</html>
